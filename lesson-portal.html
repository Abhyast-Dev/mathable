  function generateWorksheet() {
  const lessonArea = document.getElementById("worksheet-area");
    showTab('worksheet');
    const worksheetContainer = document.getElementById("worksheet-container");


  const concept = conceptData[currentConcept];
  const count = parseInt(document.getElementById("worksheet-count").value) || 5;

  if (!concept.worksheet) {
    lessonArea.innerHTML = "<p>No worksheet available for this concept.</p>";
    return;
  }

  const { parameters } = concept.worksheet;
  let questions = [];
  let answers = [];

  for (let i = 0; i < count; i++) {

    const base = rand(parameters.base_range[0], parameters.base_range[1]);
    const exp1 = rand(parameters.exp_range[0], parameters.exp_range[1]);
    const exp2 = rand(parameters.exp_range[0], parameters.exp_range[1]);
    const exp = rand(parameters.exp_range[0], parameters.exp_range[1]);
    const large_number = rand(parameters.large_number_range[0], parameters.large_number_range[1]);

    let q = "";
    let a = "";

    const templateIndex = Math.floor(Math.random() * 6);

    switch (templateIndex) {

      case 0:
        q = `Simplify: \\(${base}^{${exp1}} \\times ${base}^{${exp2}}\\)`;
        a = `\\(${base}^{${exp1 + exp2}}\\)`;
        break;

      case 1:
        q = `Evaluate: \\(${base}^{${exp}}\\)`;
        a = `\\(${Math.pow(base, exp)}\\)`;
        break;

      case 2:
        const expForm = large_number.toExponential(1);
        const [num, expVal] = expForm.split("e");
        q = `Write in standard form: \\(${large_number}\\)`;
        a = `\\(${num} \\times 10^{${parseInt(expVal)}}\\)`;
        break;

      case 3:
        q = `Simplify: \\((${base}^{${exp1}})^{${exp2}}\\)`;
        a = `\\(${base}^{${exp1 * exp2}}\\)`;
        break;

      case 4:
        q = `Evaluate: \\(${base}^{-${exp}}\\)`;
        a = `\\(\\frac{1}{${Math.pow(base, exp)}}\\)`;
        break;

      case 5:
        const root = Math.sqrt(base);
        q = `Find: \\(${base}^{1/2}\\)`;
        a = Number.isInteger(root)
          ? `\\(${root}\\)`
          : `\\(\\sqrt{${base}}\\)`;
        break;
    }

    // Safety fallback
    if (!q) q = "Error generating question";
    if (!a) a = "Solution not available";

    questions.push(q);
    answers.push(a);
  }

 worksheetContainer.innerHTML  =

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function solveQuestion(q, base, exp1, exp2, exp, large_number) {
  try {
    if (q.includes("×") && q.includes("^")) {
        return `\\(${base}^{${exp1}} \\times ${base}^{${exp2}} = ${base}^{${exp1+exp2}}\\)`;
        }
        if (q.includes("Evaluate:")) {
        return `\\(${base}^{${exp}} = ${Math.pow(base, exp)}\\)`;
        }
        if (q.includes("standard form")) {
        const expForm = large_number.toExponential(1);
        const [num, expVal] = expForm.split("e");
        return `\\(${large_number} = ${num} \\times 10^{${parseInt(expVal)}}\\)`;
        }
        if (q.includes(")^{")) {
        return `\\((${base}^{${exp1}})^{${exp2}} = ${base}^{${exp1*exp2}}\\)`;
        }
        if (q.includes("^-")) {
        return `\\(${base}^{-${exp}} = \\frac{1}{${Math.pow(base, exp)}}\\)`;
        }
        if (q.includes("1/2")) {
        return `\\(${base}^{1/2} = \\sqrt{${base}} = ${Math.sqrt(base)}\\)`;
        }
  } catch {
    return "Solution not available";
  }
}

function showTab(tab) {
  const lessonContainer = document.getElementById("lesson-container");
  const worksheetContainer = document.getElementById("worksheet-container");
  const solveContainer = document.getElementById("solve-container");
  const realContainer = document.getElementById("real-container"); // ✅ FIX

  document.getElementById("tab-lessons").classList.remove("active-tab");
  document.getElementById("tab-worksheet").classList.remove("active-tab");
  document.getElementById("tab-solve").classList.remove("active-tab");
  document.getElementById("tab-real").classList.remove("active-tab"); // ✅ ADD THIS

  lessonContainer.style.display = "none";
  worksheetContainer.style.display = "none";
  solveContainer.style.display = "none";
  realContainer.style.display = "none"; // ✅ ADD THIS

  if (tab === "lessons") {
    lessonContainer.style.display = "block";
    document.getElementById("tab-lessons").classList.add("active-tab");
    
  } 
  else if (tab === "worksheet") {
    worksheetContainer.style.display = "block";
    document.getElementById("tab-worksheet").classList.add("active-tab");
  } 
  else if (tab === "solve") {
    solveContainer.style.display = "block";
    document.getElementById("tab-solve").classList.add("active-tab");
    loadSolveLab();
  }
  else if (tab === "real") {
    realContainer.style.display = "block"; // ✅ NOW WORKS
    document.getElementById("tab-real").classList.add("active-tab");
    loadRealLifeLab();
  }
}

function normalizeInput(input) {
  return input
    .replace(/\s/g, "")        // remove spaces
    .replace(/×/g, "*")
    .replace(/x/g, "*")
    .replace(/\^/g, "**");     // JS exponent
}

function extractValueFromLatex(latex) {
  // Remove \( \)
  let clean = latex.replace(/\\\(|\\\)/g, "");

  // Handle fractions
  if (clean.includes("\\frac")) {
    const match = clean.match(/\\frac{(\d+)}{(\d+)}/);
    if (match) {
      return Number(match[1]) / Number(match[2]);
    }
  }

  // Handle standard form (a × 10^n)
  if (clean.includes("\\times")) {
    const match = clean.match(/([\d.]+)\s*\\times\s*10\^{(-?\d+)}/);
    if (match) {
      return Number(match[1]) * Math.pow(10, Number(match[2]));
    }
  }

  // Default: evaluate
  try {
    return eval(clean.replace(/\^/g, "**"));
  } catch {
    return clean;
  }
}

function validateAnswer(userInput, correctLatex) {

  const user = normalizeInput(userInput);

  let correctValue = extractValueFromLatex(correctLatex);

  let userValue;

  try {
    userValue = eval(user);
  } catch {
    userValue = user;
  }

  // Compare numerically if possible
  if (!isNaN(userValue) && !isNaN(correctValue)) {
    return Math.abs(userValue - correctValue) < 0.0001;
  }

  // fallback string compare
  return user === correctValue;
}

function showHint(step) {

  if (step === "rule") {
    document.getElementById("rule-feedback").innerHTML =
      "💡 Look at the expression: Are bases same? Is power applied again?";
  }

  if (step === "operation") {
    document.getElementById("operation-feedback").innerHTML =
      "💡 Think: Do exponents combine, repeat, or reverse?";
  }
}

function revealStepAnswer(step, correct) {

  if (step === "rule") {
    document.getElementById("rule-feedback").innerHTML =
      `✅ Correct Rule: <b>${correct}</b>`;
    document.getElementById("step2").style.display = "block";
  }

  if (step === "operation") {
    document.getElementById("operation-feedback").innerHTML =
      `✅ Correct Action: <b>${correct}</b>`;
    document.getElementById("step3").style.display = "block";
  }
}





function loadSolveLab() {
  const container = document.getElementById("solve-container");

  const base = rand(2, 5);
  const exp1 = rand(2, 4);
  const exp2 = rand(2, 4);
  const exp = rand(2, 4);
  const large_number = rand(1000, 100000);

  const templateIndex = Math.floor(Math.random() * 6);

  let q = "";
  let correctAnswer = "";
  let correctRule = "";
  let correctOperation = "";

switch (templateIndex) {

  case 0:
    q = `Simplify: \\(${base}^{${exp1}} \\times ${base}^{${exp2}}\\)`;
    correctAnswerValue = Math.pow(base, exp1 + exp2);
    correctAnswerLatex = `\\(${base}^{${exp1 + exp2}}\\)`;
    correctRule = "Product Rule";
    correctOperation = "Add exponents";
    break;

  case 1:
    q = `Evaluate: \\(${base}^{${exp}}\\)`;
    correctAnswerValue = Math.pow(base, exp);
    correctAnswerLatex = `\\(${Math.pow(base, exp)}\\)`;
    correctRule = "Evaluate Power";
    correctOperation = "Multiply repeatedly"; // ❗ FIXED
    break;

  case 2:
    const expForm = large_number.toExponential(1);
    const [num, expVal] = expForm.split("e");

    q = `Write in standard form: \\(${large_number}\\)`;

    correctAnswerValue = Number(large_number);
    correctAnswerLatex = `\\(${num} \\times 10^{${parseInt(expVal)}}\\)`;

    correctRule = "Standard Form";
    correctOperation = "Move decimal";
    break;

  case 3:
    q = `Simplify: \\((${base}^{${exp1}})^{${exp2}}\\)`;
    correctAnswerValue = Math.pow(base, exp1 * exp2);
    correctAnswerLatex = `\\(${base}^{${exp1 * exp2}}\\)`;
    correctRule = "Power of Power";
    correctOperation = "Multiply exponents";
    break;

  case 4:
    q = `Evaluate: \\(${base}^{-${exp}}\\)`;
    correctAnswerValue = 1 / Math.pow(base, exp);
    correctAnswerLatex = `\\(\\frac{1}{${Math.pow(base, exp)}}\\)`;
    correctRule = "Negative Power";
    correctOperation = "Take reciprocal";
    break;

  case 5:
    q = `Find: \\(${base}^{1/2}\\)`;
    correctAnswerValue = Math.sqrt(base);
    correctAnswerLatex = `\\(${Math.sqrt(base)}\\)`;
    correctRule = "Fractional Power";
    correctOperation = "Find root";
    break;
}
  container.innerHTML = `
    <h2>🧠 Solve Lab</h2>

    <p>${q}</p>

    <!-- STEP 1: RULE SELECTION -->
    <div id="step1">
      <p><b>Step 1:</b> Which rule applies?</p>
      <select id="rule-select">
        <option value="">Select</option>
        <option>Product Rule</option>
        <option>Power of Power</option>
        <option>Negative Power</option>
        <option>Fractional Power</option>
        <option>Standard Form</option>
        <option>Evaluate Power</option>
      </select>
       <button onclick="checkRule('${correctRule}')">Check</button>
      <button onclick="showHint('rule')">💡 Hint</button>
      <button onclick="revealStepAnswer('rule','${correctRule}')">🔓 Show Answer</button>

      <div id="rule-feedback"></div>
     
    </div>

    <div id="step2" style="display:none;">
  <p><b>Step 2:</b> What should you do?</p>

  <select id="operation-select">
    <option value="">Select</option>
    <option>Add exponents</option>
    <option>Multiply exponents</option>
    <option>Take reciprocal</option>
    <option>Find root</option>
    <option>Move decimal</option>
    <option>Multiply repeatedly</option>
  </select>

  <button onclick="checkOperation('${correctOperation}')">Check</button>
  <button onclick="showHint('operation')">💡 Hint</button>
  <button onclick="revealStepAnswer('operation','${correctOperation}')">🔓 Show Answer</button>

  <div id="operation-feedback"></div>
</div>
    <!-- STEP 3: FINAL ANSWER -->
    <div id="step3" style="display:none;">
      <p><b>Step 3:</b> Enter final answer</p>
      <input id="final-answer">
      <button onclick='checkFinalAnswer(${correctAnswerValue})'>Check</button>
      <div id="final-feedback"></div>
      <button onclick='revealSolution(${JSON.stringify(q)}, ${JSON.stringify(correctAnswerLatex)})'>🔓 Reveal</button>
      <button onclick="loadSolveLab()">➡ Next Question</button>
    </div>
  `;




  

  MathJax.typesetPromise();
}

  const val = document.getElementById("rule-select").value;
  const feedback = document.getElementById("rule-feedback");

  if (val === correctRule) {
    feedback.innerHTML = "✅ Correct!";
    document.getElementById("step2").style.display = "block";
  } else {
    feedback.innerHTML = "💡 Look at the structure carefully.";
  }
}


function checkOperation(correctOperation) {
  const val = document.getElementById("operation-select").value;
  const feedback = document.getElementById("operation-feedback");

  if (val === correctOperation) {
    feedback.innerHTML = "✅ Good!";
    document.getElementById("step3").style.display = "block";
  } else {
    feedback.innerHTML = "💡 Think about what happens to the exponents.";
  }
}



function checkFinalAnswer(correctAnswer) {

  const userInput = document.getElementById("final-answer").value;
  const feedback = document.getElementById("final-feedback");

  let userVal, correctVal;

  try {
    userVal = eval(normalizeInput(userInput));
  } catch {
    userVal = userInput;
  }

  try {
    correctVal = eval(normalizeInput(correctAnswer));
  } catch {
    correctVal = correctAnswer;
  }

  // ✅ Numeric comparison
  if (!isNaN(userVal) && !isNaN(correctVal)) {
    if (Math.abs(userVal - correctVal) < 0.0001) {
      feedback.innerHTML = "✅ Correct!";
      feedback.style.color = "green";
      return;
    }
  }

  // ✅ Accept equivalent expressions (like 4^5)
  if (normalizeInput(userInput) === normalizeInput(correctAnswer)) {
    feedback.innerHTML = "✅ Correct!";
    feedback.style.color = "green";
  } else {
    feedback.innerHTML = "❌ Try again or use hint";
    feedback.style.color = "red";
  }
}

      <b>Solution:</b><br>
      ${q} = \\\\(${ans}\\\\)

  MathJax.typesetPromise();
}
