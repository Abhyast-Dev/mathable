<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABLE™ Math Smart Lab – Exponents</title>

<!-- MathJax -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
:root {
  --primary:#2a4d8f;
  --accent:#e67e22;
  --success:#27ae60;
  --bg:#f4f7f9;
}

body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: var(--bg);
}

header {
  background: var(--primary);
  color: white;
  padding: 10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

main {
  padding: 20px;
}

.tab-nav {
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tab-nav button {
  padding:10px;
  border:none;
  cursor:pointer;
}

.active-tab {
  background: var(--accent);
  color:white;
}

.lesson-card {
  background:white;
  padding:20px;
  border-radius:10px;
  display:none;
}

.rule-box {
  background:#fff8e1;
  padding:10px;
  border-left:4px solid var(--accent);
  margin:10px 0;
}

/* PRINT */
@media print {
  header, .tab-nav, button {
    display:none !important;
  }

  .print-only {
    display:block !important;
  }

  .answer-key {
    page-break-before:always;
  }
}
</style>
</head>

<body>

<header>
  <h2>ABLE™ Smart Lab – Exponents</h2>
</header>

<main>

<div class="tab-nav">
  <button data-tab="lessons">📘 Lessons</button>
  <button data-tab="exp-formulas">📑 Formulas</button>
  <button data-tab="solve">🧠 Solve</button>
  <button data-tab="worksheet">📄 Worksheet</button>
  <button data-tab="real">🌍 Real Life</button>
</div>

<!-- LESSONS -->
<div id="lessons-container" class="lesson-card">
  <h2>Basics of Exponents</h2>

  <div class="rule-box">
    In \(a^n\), a = base, n = power
  </div>

  <div class="rule-box">
    \(2^5 = 32\)
  </div>
</div>

<!-- FORMULAS -->
<div id="exp-formulas-container" class="lesson-card">
  <h2>Exponent Formulas</h2>

  <div id="formula-card"></div>

  <button onclick="Modules['exp-formulas'].prev()">⬅</button>
  <button onclick="Modules['exp-formulas'].next()">➡</button>
</div>

<!-- SOLVE -->
<div id="solve-container" class="lesson-card"></div>

<!-- WORKSHEET -->
<div id="worksheet-container" class="lesson-card"></div>

<!-- REAL -->
<div id="real-container" class="lesson-card"></div>

</main>

<script>

/* ======================
   CORE APP
====================== */
const App = {
  init() {
    document.querySelectorAll("[data-tab]").forEach(btn => {
      btn.addEventListener("click", () => {
        this.showTab(btn.dataset.tab);
      });
    });

    this.showTab("lessons");
  },

  showTab(tab) {
    document.querySelectorAll(".lesson-card").forEach(el => el.style.display="none");
    document.querySelectorAll("[data-tab]").forEach(el => el.classList.remove("active-tab"));

    document.getElementById(tab + "-container").style.display="block";
    document.querySelector(`[data-tab="${tab}"]`).classList.add("active-tab");

    Modules[tab]?.init();
  }
};

/* ======================
   MODULES
====================== */
const Modules = {};

/* FORMULAS */
Modules["exp-formulas"] = {
  index:0,

  data:[
    {title:"Product", formula:"\\(a^m a^n = a^{m+n}\\)"},
    {title:"Power", formula:"\\((a^m)^n = a^{mn}\\)"},
    {title:"Negative", formula:"\\(a^{-n} = 1/a^n\\)"}
  ],

  init(){ this.render(); },

  render(){
    const f = this.data[this.index];
    document.getElementById("formula-card").innerHTML =
      `<h3>${f.title}</h3><p>${f.formula}</p>`;

    if(window.MathJax) MathJax.typesetPromise();
  },

  next(){ this.index=(this.index+1)%this.data.length; this.render(); },
  prev(){ this.index=(this.index-1+this.data.length)%this.data.length; this.render(); }
};

/* SOLVE */
Modules["solve"] = {
  init(){
    const base = rand(2,5);
    const exp = rand(2,4);
    const correct = Math.pow(base,exp);

    document.getElementById("solve-container").innerHTML = `
      <h2>Solve</h2>
      <p>\\(${base}^${exp}\\)</p>
      <input id="ans">
      <button onclick="Modules.solve.check(${correct})">Check</button>
      <div id="fb"></div>
    `;

    MathJax.typesetPromise();
  },

  check(correct){
    let v;
    try { v = eval(document.getElementById("ans").value); }
    catch { return this.fb("Invalid"); }

    if(Math.abs(v-correct)<0.001)
      this.fb("✅ Correct","green");
    else
      this.fb("❌ Try again","red");
  },

  fb(msg,c="black"){
    const el=document.getElementById("fb");
    el.innerHTML=msg;
    el.style.color=c;
  }
};

/* WORKSHEET */
Modules["worksheet"] = {
  init(){
    let q="";
    let a="";

    for(let i=1;i<=5;i++){
      let base=rand(2,5), exp=rand(2,4);
      q+=`<li>${base}^${exp}</li>`;
      a+=`<div>${Math.pow(base,exp)}</div>`;
    }

    document.getElementById("worksheet-container").innerHTML=`
      <h2>Worksheet</h2>
      <ol>${q}</ol>
      <button onclick="window.print()">Download</button>

      <div class="answer-key">
        <h3>Answers</h3>
        ${a}
      </div>
    `;
  }
};

/* REAL */
Modules["real"] = {
  init(){
    document.getElementById("real-container").innerHTML=`
      <h2>Real Life</h2>
      <p>Virus doubles → \\(2^5 = 32\\)</p>
    `;
    MathJax.typesetPromise();
  }
};

/* UTIL */
function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

/* INIT */
App.init();

</script>

</body>
</html>
