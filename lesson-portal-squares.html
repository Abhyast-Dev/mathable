<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABLE™ Smart Lab | Squares & Cubes</title>
  <style>
    /* 1. Global Setup & Theming */
    :root { 
      --primary: #2a4d8f; 
      --accent: #e67e22; 
      --success: #27ae60; 
      --bg: #f4f7f9; 
      --card-bg: #ffffff;
      --text-dark: #2c3e50;
      --text-muted: #666666;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-dark); }
    
    /* 2. Top Navigation Bar */
    header { 
      background: var(--primary); 
      color: white; 
      padding: 15px 30px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    header h1 { margin: 0; font-size: 1.3rem; font-weight: 600; }
    header img { height: 40px; }
    nav a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
    
    /* 3. Main Workspace Container */
    main { padding: 40px 20px; max-width: 1000px; margin: auto; min-height: 80vh; }
    h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.6rem; }
    h3 { color: var(--primary); margin-bottom: 12px; }

    /* 4. Smooth Tab Bar Options */
    .tabs { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 30px; 
      overflow-x: auto; 
      padding-bottom: 5px; 
    }
    .tabs button { 
      padding: 12px 20px; 
      border: 1px solid #dcdde1; 
      border-radius: 8px; 
      cursor: pointer; 
      background: white; 
      font-weight: 600; 
      color: var(--text-dark);
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .tabs button:hover { background: #eef3fb; color: var(--primary); }
    .tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    /* 5. Content Layout Blocks */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .lesson-card-wrapper {
      background: white; 
      padding: 30px; 
      margin-bottom: 25px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.03);
    }
    .lesson { border-bottom: 1px solid #edf2f7; padding-bottom: 25px; margin-bottom: 25px; }
    .lesson:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .lesson p { line-height: 1.6; color: #4a5568; margin-bottom: 10px; }

    /* 6. Utility Interactive Components & Tables */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px 15px; border: 1px solid #e2e8f0; text-align: center; }
    th { background: #f7fafc; color: var(--primary); font-weight: 600; }
    
    input, select { 
      padding: 8px 12px; 
      border: 1px solid #cbd5e0; 
      border-radius: 6px; 
      font-size: 0.95rem; 
      margin: 5px;
    }
    
    button.action-btn {
      background: var(--primary); color: white; border: none; padding: 8px 16px; 
      border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    button.action-btn:hover { background: #1a3673; }

    /* 7. Answer Key Scaffolding Styles */
    .answer-key-section { display: none !important; }
    .hint { color: var(--accent); }
    .solution { color: var(--success); }
    
    @media (max-width: 600px) {
      header { flex-direction: column; gap: 10px; text-align: center; }
      nav { margin-top: 5px; }
    }
  </style>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:15px;">
    <a href="index.html"><img src="Logo.png" alt="ABLE™ Logo"></a>
    <h1>ABLE™ MathABLE - Squares & Cubes</h1>
  </div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<main>
  <div class="tabs">
    <button class="tab-trigger active" onclick="showTab(event, 'lessons')">Lessons</button>
    <button class="tab-trigger" onclick="showTab(event, 'worksheet')">Worksheet</button>
    <button class="tab-trigger" onclick="showTab(event, 'solve')">Solve Lab</button>
    <button class="tab-trigger" onclick="showTab(event, 'real')">Real Life Lab</button>
    <button class="tab-trigger" onclick="showTab(event, 'calculator')">Calculator</button>
  </div>

  <div id="lessons" class="lesson-card-wrapper tab-content active"></div>
  
  <div id="calculator" class="lesson-card-wrapper tab-content">
    <h2>🧮 Square & Cube Chart Generator</h2>
    <div style="margin-bottom: 15px; background: #f8fbff; padding: 15px; border-radius: 8px;">
      <label>Start Value: <input id="calc-start" type="number" value="1" style="width:70px;"></label>
      <label style="margin-left: 15px;">End Value: <input id="calc-end" type="number" value="20" style="width:70px;"></label>
      <button class="action-btn" onclick="generateChart()" style="margin-left: 15px;">Generate Chart</button>
    </div>
    <div id="calc-output" style="overflow-x:auto;"></div>
  </div>

  <div id="solve" class="lesson-card-wrapper tab-content">
    <div id="solve-container"></div>
  </div>

  <div id="worksheet" class="lesson-card-wrapper tab-content">
    <div id="worksheet-container"></div>
  </div>
    
  <div id="real" class="lesson-card-wrapper tab-content">
    <div id="real-container"></div>
  </div>
</main>

<script>
  // Core Module Framework Context Engine Data Object
  const concept = {
    "title": "Squares & Cubes",
    "lessons": [
      { 
        "id":"sc1",
        "name":"Square Numbers",
        "content":"Squares are numbers multiplied by themselves. Example: \\(5^2 = 25\\).<br><br><b>Pattern:</b> Consecutive squares differ by odd numbers (1, 3, 5, 7...).<br><b>Quick Practice:</b> What is \\(7^2\\)? What is \\(12^2\\)?<br><b>Applications:</b> Squares are used to calculate areas of squares and in algebra."
      },
      { 
        "id":"sc2",
        "name":"Square Roots",
        "content":"The square root of a number is the value that, when squared, gives the original number. Example: \\(\\sqrt{49} = 7\\).<br><br><b>Note:</b> Not all numbers have whole number square roots (e.g., \\(\\sqrt{2}\\)).<br><b>Quick Practice:</b> Find \\(\\sqrt{81}\\). Estimate \\(\\sqrt{20}\\).<br><b>Applications:</b> Square roots are used in solving quadratic equations and in geometry."
      },
      { 
        "id":"sc3",
        "name":"Cube Numbers",
        "content":"Cubes are numbers multiplied by themselves three times. Example: \\(3^3 = 27\\).<br><br><b>Pattern:</b> Cubes grow faster than squares (e.g., \\(2^3=8\\), \\(5^3=125\\)).<br><b>Quick Practice:</b> What is \\(4^3\\)? What is \\(10^3\\)?<br><b>Applications:</b> Cubes are used to calculate volumes of cubes and in higher algebra."
      },
      { 
        "id":"sc4",
        "name":"Cube Roots",
        "content":"The cube root of a number is the value that, when cubed, gives the original number. Example: \\(\\sqrt[3]{64} = 4\\).<br><br><b>Note:</b> Cube roots can be irrational (e.g., \\(\\sqrt[3]{2}\\)).<br><b>Quick Practice:</b> Find \\(\\sqrt[3]{27}\\). Estimate \\(\\sqrt[3]{50}\\).<br><b>Applications:</b> Cube roots are used in scaling problems and in physics."
      }
    ]
  };

  // Render Static Lessons on Runtime Core Activation
  const lessonDiv = document.getElementById("lessons");
  concept.lessons.forEach(l => {
    const block = document.createElement("div");
    block.className = "lesson";
    block.innerHTML = `<h2>${l.name}</h2><p>${l.content}</p>`;
    lessonDiv.appendChild(block);
  });

  // Base Helper Math Operations
  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function toggleAnswer(i) {
    const ansDiv = document.getElementById("answer-" + i);
    if(ansDiv) ansDiv.style.display = ansDiv.style.display === "none" ? "block" : "none";
  }
  function isPerfectSquare(n) { return Number.isInteger(Math.sqrt(n)); }
  function isPerfectCube(n) { return Number.isInteger(Math.cbrt(n)); }
  function explainSquare(n) { return isPerfectSquare(n) ? `${n} is a perfect square (root = ${Math.sqrt(n)}).` : "-"; }
  function explainCube(n) { return isPerfectCube(n) ? `${n} is a perfect cube (root = ${Math.cbrt(n)}).` : "-"; }

  // Numeric Chart Dashboard Module UI Generator Logic
  function generateChart() {
    const start = parseInt(document.getElementById("calc-start").value) || 1;
    const end = parseInt(document.getElementById("calc-end").value) || 20;
    const out = document.getElementById("calc-output");

    let table = `
      <table>
        <thead>
          <tr>
            <th>Number</th>
            <th>Square</th>
            <th>Cube</th>
            <th>Perfect Square?</th>
            <th>Perfect Cube?</th>
            <th>Explanation</th>
          </tr>
        </thead>
        <tbody>
    `;

    for (let i = start; i <= end; i++) {
      const square = i * i;
      const cube = i * i * i;
      table += `
        <tr>
          <td><b>${i}</b></td>
          <td>${square}</td>
          <td>${cube}</td>
          <td>${isPerfectSquare(i) ? "✅ Yes" : "❌ No"}</td>
          <td>${isPerfectCube(i) ? "✅ Yes" : "❌ No"}</td>
          <td style="text-align:left; font-size:0.9rem; color:#4a5568;">
            ${explainSquare(i) !== "-" ? explainSquare(i) : explainCube(i)}
          </td>
        </tr>
      `;
    }
    table += "</tbody></table>";
    out.innerHTML = table;
  }

  // Adaptive Worksheet Engine Real-time Pipeline
  function generateWorksheet() {
    const worksheetContainer = document.getElementById("worksheet-container");
    // Handle conditional element validation cleanly to avoid initialization layout crashes
    const count = document.getElementById("qCount") ? parseInt(document.getElementById("qCount").value) : 5;

    let questions = [];
    let answers = [];

    for (let i = 0; i < count; i++) {
        const base = rand(2, 12);
        const square = base * base;
        const cube = base * base * base;

        let q = "", a = "";
        const templateIndex = Math.floor(Math.random() * 4);

        switch (templateIndex) {
            case 0: q = `Evaluate: \\(${base}^2\\)`; a = `\\(${square}\\)`; break;
            case 1: q = `Evaluate: \\(${base}^3\\)`; a = `\\(${cube}\\)`; break;
            case 2: q = `Find: \\(\\sqrt{${square}}\\)`; a = `\\(${base}\\)`; break;
            case 3: q = `Find: \\(\\sqrt[3]{${cube}}\\)`; a = `\\(${base}\\)`; break;
        }
        questions.push(q);
        answers.push(a);
    }

    const questionsListHtml = questions.map((q, i) => `
        <div class="question-item" style="margin-bottom:20px; padding:15px; background:#f7fafc; border-radius:8px;">
          <div class="math-q" style="font-size:1.1rem; margin-bottom:8px;">
            <strong>Q${i + 1}.</strong> ${q}
          </div>
          <button class="no-print" onclick="toggleAnswer(${i})" style="padding:4px 10px; font-size:0.8rem; cursor:pointer;">Show Answer</button>
          <div id="answer-${i}" class="answer-div" style="display:none; color:var(--success); font-weight:bold; margin-top:10px; border-left:3px solid var(--success); padding-left:10px;">
              Answer: ${answers[i]}
          </div>
        </div>
    `).join("");

    worksheetContainer.innerHTML = `
        <h2 class="no-print">📄 Custom Practice Generation (Assess)</h2>
        <div class="no-print" style="margin-bottom:20px; background:#f8fbff; padding:15px; border-radius:10px; border:1px solid #e1e8f0;">
            <label>Number of Questions: </label>
            <input type="number" id="qCount" value="${count}" min="1" max="25" style="width:60px;">
            <button class="action-btn" onclick="generateWorksheet()">Update Setup</button>
        </div>
        <div class="question-grid">
          ${questionsListHtml}
        </div>
    `;

    if (window.MathJax && window.MathJax.typesetPromise) {
      MathJax.typesetPromise();
    }
  }

  // Interactive Autonomous Metacognitive State Tracker Lab Engine
  function loadSolveLab() {
    const container = document.getElementById("solve-container");
    const level = getDifficultyLevel();
    const base = rand(level.min, level.max);
    const type = Math.random() > 0.5 ? "square" : "cube";

    let number, q, answer;

    if (type === "square") {
      number = base * base;
      answer = base;
      q = `Find: \\(\\sqrt{${number}}\\)`;
    } else {
      number = base * base * base;
      answer = base;
      q = `Find: \\(\\sqrt[3]{${number}}\\)`;
    }

    window.currentNumber = number;
    window.currentAnswer = answer;
    window.currentType = type;

    container.innerHTML = `
      <h2>🧠 Structural Process Method Lab</h2>
      <div style="background:#f0f4f8; padding:20px; border-radius:8px; font-size:1.3rem; margin-bottom:20px; font-weight:bold; text-align:center;">
        ${q}
      </div>

      <div id="step1" class="lesson-card-wrapper" style="box-shadow:none; border:1px solid #cbd5e0;">
        <p style="margin-bottom:10px;"><b>Step 1:</b> Categorize Root Operation Target Type</p>
        <select id="rule-select">
          <option value="">-- Choose System Standard --</option>
          <option value="Square Root">Square Root</option>
          <option value="Cube Root">Cube Root</option>
        </select>
        <button class="action-btn" onclick="checkRule('${type === "square" ? "Square Root" : "Cube Root"}')">Verify Identity</button>
        <div id="rule-feedback" style="margin-top:10px; font-weight:bold;"></div>
      </div>

      <div id="step2" class="lesson-card-wrapper" style="display:none; box-shadow:none; border:1px solid #cbd5e0;">
        <p style="margin-bottom:12px;"><b>Step 2:</b> Deconstruct Operation Method Engine</p>
        <button class="action-btn" style="background:#4a5568;" onclick="showMethod('prime', ${number}, '${type}')">Prime Factorization</button>
        <button class="action-btn" style="background:#4a5568; margin-left:10px;" onclick="showMethod('division', ${number}, '${type}')">Long Division Method</button>
        <div id="method-output" style="margin-top:15px;"></div>
      </div>

      <div id="step3" class="lesson-card-wrapper" style="display:none; box-shadow:none; border:1px solid #cbd5e0;">
        <p style="margin-bottom:10px;"><b>Step 3:</b> Execute Autonomous Matrix Valuation</p>
        <input id="final-answer" type="number" placeholder="Input Evaluated Value" style="width:200px;">
        <button class="action-btn" onclick="checkFinalAnswer()">Validate Valuation</button>
        <button class="action-btn" style="background:#e67e22; margin-left:10px;" onclick="showExplanation()">Explain Operations</button>
        <button class="action-btn" style="background:#27ae60; margin-left:10px;" onclick="loadSolveLab()">Load Next Array ➡</button>
        <div id="final-feedback" style="margin-top:15px; font-weight:bold; font-size:1.05rem;"></div>
      </div>
    `;

    if (window.MathJax && window.MathJax.typesetPromise) {
      MathJax.typesetPromise();
    }
  }

  function getDifficultyLevel() {
    const level = localStorage.getItem("math_level") || "6";
    const config = {
      "6": { min: 2, max: 10 },
      "7": { min: 5, max: 15 },
      "8": { min: 8, max: 20 },
      "9": { min: 10, max: 25 },
      "10": { min: 12, max: 30 }
    };
    return config[level] || config["6"];
  }

  function checkRule(correctRule) {
    const val = document.getElementById("rule-select").value;
    const feedback = document.getElementById("rule-feedback");
    if (val === correctRule) {
      feedback.innerHTML = "✅ Identity Mapping Verified!";
      feedback.style.color = "var(--success)";
      document.getElementById("step2").style.display = "block";
    } else {
      feedback.innerHTML = "💡 Structural Mismatch. Re-verify root index criteria.";
      feedback.style.color = "var(--accent)";
    }
  }

  function checkFinalAnswer() {
    const userInput = document.getElementById("final-answer").value;
    const user = parseFloat(userInput);
    const correct = window.currentAnswer;
    const num = window.currentNumber;
    const type = window.currentType;
    const feedback = document.getElementById("final-feedback");

    if (user === correct) {
      feedback.innerHTML = "✅ Computation Precise! Absolute target mapping achieved.";
      feedback.style.color = "var(--success)";
      return;
    }

    let message = "❌ Operational Variance Found. ";
    if (type === "square") {
      if (user * 2 === correct) message += `Arithmetic scale error: You halved target criteria.`;
      else message += `Operational delta confirmation failure: ${user} × ${user} = ${user*user}.`;
    } else {
      if (user * user === num) message += `Dimensional index conflict: Applied 2D matrix transformation instead of 3D volume root.`;
      else message += `Verification mismatch: ${user}³ = ${user**3}.`;
