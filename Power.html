<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ABLE™ Smart Lab | Power Play (Exponents)</title>
  <style>
    /* ============================================================
       CORE & PRINT STYLES
       ============================================================ */
    :root { --primary:#2a4d8f; --accent:#e67e22; --success:#27ae60; --bg:#f4f7f9; }
    body { font-family:'Segoe UI',sans-serif; margin:0; background:var(--bg); }
    header { background:var(--primary); color:white; padding:15px 30px; display:flex; align-items:center; justify-content:space-between; }
    nav a { color:white; margin-left:20px; text-decoration:none; font-weight:bold; }
    main { padding:30px; max-width:1000px; margin:auto; }
    .tabs { display:flex; gap:15px; margin-bottom:20px; }
    .tabs button { padding:10px 20px; border:none; border-radius:6px; cursor:pointer; background:#ddd; font-weight:bold; }
    .tabs button.active { background:var(--accent); color:white; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .lesson { background:white; padding:20px; margin-bottom:20px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    header img { height:50px; }
    header h1 { margin:0; font-size:1.5rem; }
    h2 { color:var(--primary); }

    /* ============================================================
       RESPONSIVE DESIGN (MOBILE / TABLET)
       ============================================================ */
    @media (max-width: 768px) {
      header { flex-direction: column; align-items: flex-start; gap: 10px; }
      header h1 { font-size: 1.1rem; }
      .tabs { flex-wrap: wrap; gap: 8px; }
      .tabs button { flex: 1 1 calc(50% - 10px); padding: 8px; font-size: 0.9rem; }
      main { padding: 15px; }
    }

    /* ============================================================
       PRINT ENGINE (PDF STYLES)
       ============================================================ */
    @media print {
      body { background: white !important; font-size: 12pt; }
      header, nav, .tabs, button, .no-print, hr { display: none !important; }
      main { padding: 0; width: 100%; max-width: 100%; }
      .tab-content { display: none !important; }
      #worksheet.tab-content { display: block !important; }
      .lesson-card { box-shadow: none; padding: 0; margin: 0; }
      .print-only { display: block !important; }
      .student-info { display: flex !important; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
      .question-item { page-break-inside: avoid; margin-bottom: 30px; display: block; width: 100%; }
      .answer-key-section { page-break-before: always; display: block !important; border-top: 2px dashed #ccc; padding-top: 20px; }
      .answer-grid { column-count: 2; column-gap: 20px; }
    }
    
    .print-only { display: none; }
    .student-info div { font-weight: bold; }
  </style>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:15px;">
    <a href="index.html"><img src="Logo.png" alt="ABLE™ Logo"></a>
    <h1>ABLE™ -> MathABLE - Power Play</h1>
  </div>
  <nav><a href="index.html">Home</a></nav>
</header>

<main>
  <div class="tabs no-print">
    <button class="active" onclick="showTab('lessons')">Lessons</button>
    <button onclick="showTab('worksheet')">Worksheet</button>
    <button onclick="showTab('solve')">Solve Lab</button>
    <button onclick="showTab('real')">Real Life Lab</button>
    <button onclick="showTab('calculator')">Calculator</button>
  </div>

  <div id="lessons" class="lesson-card tab-content active"></div>
  
  <div id="calculator" class="lesson-card tab-content">
    <h2>🧮 Exponential Power Table</h2>
    <label>Base: <input id="calc-base" type="number" value="2"></label>
    <label>Up to Power: <input id="calc-end" type="number" value="10"></label>
    <button onclick="generateChart()">Generate Chart</button>
    <div id="calc-output" style="margin-top:20px;"></div>
  </div>

  <div id="solve" class="lesson-card tab-content"><div id="solve-container"></div></div>
  
  <div id="worksheet" class="lesson-card tab-content">
    <div class="print-only student-info">
        <div>Name: ________________________</div>
        <div>Class: ________</div>
        <div>Date: ________</div>
    </div>
    <div id="worksheet-container"></div>
    <div id="answer-key-print" class="print-only answer-key-section">
        <h2>🔑 Answer Key</h2>
        <div id="answer-key-grid" class="answer-grid"></div>
    </div>
  </div>
  
  <div id="real" class="lesson-card tab-content"><div id="real-container"></div></div>
</main>

<script>
  // ABLE PDF ENGINE
  const ABLE_PDF = {
    download: function() {
        const isApple = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);
        if (isApple) {
            alert("Apple Users: After the print window opens, tap the 'Share' icon (or click the 'PDF' dropdown on Mac) and select 'Save to Files' to download your PDF.");
        }
        window.print();
    }
  };

  const concept = {
    "title": "Power Play (Exponents)",
    "lessons": [
      { 
        "id":"pp1",
        "name":"Exponential Notation",
        "content":"Exponents represent repeated multiplication of the same number[cite: 70]. Example: \\(5^4 = 5 \\times 5 \\times 5 \\times 5\\).<br><br><b>Key Terms:</b> In \\(5^4\\), 5 is the <b>base</b> and 4 is the <b>exponent</b> or power[cite: 73]."
      },
      { 
        "id":"pp2",
        "name":"Multiplication Law",
        "content":"When multiplying powers with the same base, we add the exponents [cite: 184, 947]: \\(n^a \\times n^b = n^{a+b}\\).<br><br><b>Quick Practice:</b> Write \\(p^4 \\times p^6\\) in exponential form[cite: 181]."
      },
      { 
        "id":"pp3",
        "name":"Division Law",
        "content":"When dividing powers with the same base, we subtract the exponents [cite: 322, 949]: \\(n^a \\div n^b = n^{a-b}\\) (where \\(n \\neq 0\\)).<br><br><b>Note:</b> If the exponent is 0, the value is always 1[cite: 334, 335, 952]."
      },
      { 
        "id":"pp4",
        "name":"Scientific Notation",
        "content":"Large numbers are written as \\(x \\times 10^y\\), where \\(1 \\le x < 10\\) [cite: 487, 955].<br><br><b>Applications:</b> Used to express the distance of the Sun or the population of the Earth concisely[cite: 468, 649]."
      }
    ]
  };

  // Render Lessons
  const lessonDiv = document.getElementById("lessons");
  concept.lessons.forEach(l => {
    const block = document.createElement("div");
    block.className = "lesson";
    block.innerHTML = `<h2>${l.name}</h2><p>${l.content}</p>`;
    lessonDiv.appendChild(block);
  });

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function toggleAnswer(i) {
    const ansDiv = document.getElementById("answer-" + i);
    ansDiv.style.display = ansDiv.style.display === "none" ? "block" : "none";
  }

  function generateChart() {
    const base = parseInt(document.getElementById("calc-base").value);
    const end = parseInt(document.getElementById("calc-end").value);
    const out = document.getElementById("calc-output");
    let table = `<table border="1" cellpadding="8" style="border-collapse:collapse; text-align:center; width:100%;">
                 <tr style="background:#eee;"><th>Expression</th><th>Expanded Form</th><th>Value</th></tr>`;
    for (let i = 1; i <= end; i++) {
      let expanded = new Array(i).fill(base).join(" × ");
      let val = Math.pow(base, i);
      table += `<tr><td>\\(${base}^{${i}}\\)</td><td>${expanded}</td><td>${val.toLocaleString()}</td></tr>`;
    }
    table += "</table>";
    out.innerHTML = table;
    MathJax.typesetPromise();
  }

  function generateWorksheet() {
    const worksheetContainer = document.getElementById("worksheet-container");
    const keyGrid = document.getElementById("answer-key-grid");
    const count = document.getElementById("qCount")?.value || 5;
    let questions = [];
    let answers = [];

    for (let i = 0; i < count; i++) {
        const base = rand(2, 10);
        const exp1 = rand(2, 5);
        const exp2 = rand(2, 5);
        let q = "", a = "";
        const type = rand(0, 3);
        switch (type) {
            case 0: q = `Simplify: \\(${base}^{${exp1}} \\times ${base}^{${exp2}}\\)`; a = `\\(${base}^{${exp1+exp2}}\\)`; break;
            case 1: q = `Simplify: \\(${base}^{${exp1+exp2}} \\div ${base}^{${exp1}}\\)`; a = `\\(${base}^{${exp2}}\\)`; break;
            case 2: q = `Value of: \\((${base}^0 \\times ${base}^2)\\)`; a = `\\(${Math.pow(base, 2)}\\)`; break;
            case 3: q = `Scientific form of: ${base * 1000}`; a = `\\(${base} \\times 10^3\\)`; break;
        }
        questions.push(q); answers.push(a);
    }

    const questionsListHtml = questions.map((q, i) => `
         <div class="question-item">
            <p><strong>Qs${i + 1}.</strong> ${q}</p>
            <button class="no-print" onclick="toggleAnswer(${i})">Show Answer</button>
            <div id="answer-${i}" class="no-print" style="display:none; color:var(--success); margin-top:5px;">Answer: ${answers[i]}</div>
         </div><hr class="no-print">
    `).join("");

    keyGrid.innerHTML = answers.map((a, i) => `<div><strong>Q${i + 1}:</strong> ${a}</div>`).join("");

    worksheetContainer.innerHTML = `
        <h2 class="no-print">📄 Worksheet (Assess)</h2>
        <div class="no-print" style="margin-bottom:20px; display: flex; gap: 10px; align-items: center;">
            <label>Questions: </label>
            <input type="number" id="qCount" value="${count}" min="1" max="20" style="width: 50px;">
            <button onclick="generateWorksheet()">Update</button>
            <button onclick="ABLE_PDF.download()" style="background:var(--accent); color:white;">📥 Download PDF</button>
        </div>
        <div>${questionsListHtml}</div>
    `;
    MathJax.typesetPromise();
  }

  function loadSolveLab() {
    const container = document.getElementById("solve-container");
    const base = rand(2, 9);
    const exp1 = rand(2, 6);
    const exp2 = rand(2, 6);
    window.currentAnswer = exp1 + exp2;
    container.innerHTML = `
      <h2>🧠 Solve Lab</h2>
      <p><b>Problem:</b> Simplify \\(${base}^{${exp1}} \\times ${base}^{${exp2}}\\)</p>
      <div id="step1">
        <p><b>Step 1 (Ask):</b> What do we do with exponents when multiplying same bases? [cite: 184, 947]</p>
        <select id="rule-select">
          <option value="">Select</option>
          <option value="add">Add them</option>
          <option value="sub">Subtract them</option>
        </select>
        <button onclick="checkRule('add')">Check</button>
        <div id="rule-feedback"></div>
      </div>
      <div id="step2" style="display:none; margin-top:15px;">
        <p><b>Step 2 (Think):</b> What is \\(${exp1} + ${exp2}\\)?</p>
        <input id="final-answer" type="number">
        <button onclick="checkFinalAnswer()">Verify</button>
        <div id="final-feedback"></div>
      </div>
    `;
    MathJax.typesetPromise();
  }

  function checkRule(correct) {
    const val = document.getElementById("rule-select").value;
    const feedback = document.getElementById("rule-feedback");
    if (val === correct) {
      feedback.innerHTML = "✅ Correct!";
      document.getElementById("step2").style.display = "block";
    } else {
      feedback.innerHTML = "💡 Hint: Multiplication leads to addition[cite: 947].";
    }
  }

  function checkFinalAnswer() {
    const user = parseInt(document.getElementById("final-answer").value);
    const feedback = document.getElementById("final-feedback");
    if (user === window.currentAnswer) {
      feedback.innerHTML = "✅ Perfect! The result is base raised to the power of " + user;
    } else {
      feedback.innerHTML = "❌ Try the addition again.";
    }
  }

  function loadRealLifeLab() {
    const container = document.getElementById("real-container");
    const scenarios = [
      {
        title: "📄 The Paper Fold",
        story: "A sheet of paper doubles in thickness with every fold[cite: 22, 42, 945].",
        question: "If initial thickness is 0.001 cm, what is it after 10 folds? [cite: 24, 55]",
        steps: ["Formula: Initial × 2^folds","0.001 × 2^10 [cite: 58]","0.001 × 1024 [cite: 76]"],
        final: "1.024 cm [cite: 24]"
      },
      {
        title: "🪷 Magical Pond",
        story: "Lotuses in a pond double every day. After 30 days, it is full[cite: 220, 604].",
        question: "On which day was it half full? [cite: 221]",
        steps: ["Growth is exponential (×2)","Half full is one day before full","30 - 1 day"],
        final: "29th Day [cite: 223]"
      },
      {
        title: "🌌 Stars in the Galaxy",
        story: "There are approximately 100,000,000,000 stars in our galaxy[cite: 469].",
        question: "Express this in scientific notation[cite: 475, 487].",
        steps: ["Count zeroes after the first digit","1 followed by 11 zeroes","Base 10 with power 11"],
        final: "\\(1 \\times 10^{11}\\) [cite: 469]"
      }
    ];
    const random = scenarios[Math.floor(Math.random() * scenarios.length)];
    container.innerHTML = `
      <h2>🌍 Real Life Lab</h2>
      <h3>${random.title}</h3>
      <p>${random.story}</p>
      <p><b>Problem:</b> ${random.question}</p>
      <div style="background:#f9fbff; padding:15px; border-radius:8px;">
        <b>🧠 Solution Steps:</b>
        <ol>${random.steps.map(s => `<li>${s}</li>`).join("")}</ol>
        <b>✅ Final Answer:</b> ${random.final}
      </div>
      <br><button onclick="loadRealLifeLab()">Next Case Study</button>
    `;
    MathJax.typesetPromise();
  }

  function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
    if (id === "solve") loadSolveLab();
    if (id === "real") loadRealLifeLab();
    if (id === "worksheet") generateWorksheet();
  }
</script>

</body>
</html>
