<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABLE™ Smart Lab | Power Play (Exponents)</title>
  <style>
    /* ============================================================
       1. CORE GLOBAL THEME & RESET VARIABLES
       ============================================================ */
    :root { 
      --primary: #2a4d8f; 
      --accent: #e67e22; 
      --success: #27ae60; 
      --bg: #f4f7f9; 
      --card-bg: #ffffff;
      --text-dark: #2c3e50;
      --text-muted: #666666;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-dark); }
    
    /* ============================================================
       2. NAVIGATION HEADER COMPONENT
       ============================================================ */
    header { 
      background: var(--primary); 
      color: white; 
      padding: 15px 30px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    header h1 { margin: 0; font-size: 1.3rem; font-weight: 600; }
    header img { height: 40px; }
    nav a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
    
    /* ============================================================
       3. WORKSPACE CONTAINER LAYOUT
       ============================================================ */
    main { padding: 40px 20px; max-width: 1000px; margin: auto; min-height: 80vh; }
    h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.6rem; }
    h3 { color: var(--primary); margin-bottom: 12px; }

    /* ============================================================
       4. INTERACTIVE TAB NAVIGATION LINK SYSTEMS
       ============================================================ */
    .tabs { 
      display: flex; 
      gap: 10px; 
      margin-bottom: 30px; 
      overflow-x: auto; 
      padding-bottom: 5px; 
    }
    .tabs button { 
      padding: 12px 20px; 
      border: 1px solid #dcdde1; 
      border-radius: 8px; 
      cursor: pointer; 
      background: white; 
      font-weight: 600; 
      color: var(--text-dark);
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .tabs button:hover { background: #eef3fb; color: var(--primary); }
    .tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    /* ============================================================
       5. MAIN INTERFACE CONTENT HOUSING LAYOUT BLOCKS
       ============================================================ */
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .lesson-card {
      background: white; 
      padding: 30px; 
      margin-bottom: 25px; 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.03);
    }
    .lesson { border-bottom: 1px solid #edf2f7; padding-bottom: 25px; margin-bottom: 25px; }
    .lesson:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
    .lesson p { line-height: 1.6; color: #4a5568; margin-bottom: 10px; }

    /* ============================================================
       6. LAB INPUT PANELS & DATA TABLES MATRIX
       ============================================================ */
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px 15px; border: 1px solid #e2e8f0; text-align: center; }
    th { background: #f7fafc; color: var(--primary); font-weight: 600; }
    
    input, select { 
      padding: 8px 12px; 
      border: 1px solid #cbd5e0; 
      border-radius: 6px; 
      font-size: 0.95rem; 
      margin: 5px;
    }
    
    button.action-btn {
      background: var(--primary); color: white; border: none; padding: 8px 16px; 
      border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s;
    }
    button.action-btn:hover { background: #1a3673; }
    
    .question-item { margin-bottom: 20px; padding: 20px; background: #f7fafc; border-radius: 8px; border: 1px solid #edf2f7; }
    .print-only { display: none; }

    /* ============================================================
       7. RESPONSIVE LAYER ADAPTIVE MEDIA BREAKPOINTS
       ============================================================ */
    @media (max-width: 768px) {
      header { flex-direction: column; gap: 10px; text-align: center; }
      .tabs button { flex: 1 1 calc(50% - 10px); padding: 10px; font-size: 0.9rem; }
      main { padding: 20px 15px; }
    }

    /* ============================================================
       8. PRINT MEDIA OVERRIDE HOOK PIPELINES
       ============================================================ */
    @media print {
      body { background: white !important; font-size: 12pt; color: #000; }
      header, nav, .tabs, button, .no-print, hr { display: none !important; }
      main { padding: 0; width: 100%; max-width: 100%; }
      .tab-content { display: none !important; }
      #worksheet.tab-content { display: block !important; }
      .lesson-card { box-shadow: none; padding: 0; margin: 0; border: none; }
      .print-only { display: block !important; }
      .student-info { display: flex !important; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 25px; }
      .question-item { page-break-inside: avoid; margin-bottom: 25px; background: none; border: none; padding: 0; }
      .answer-key-section { page-break-before: always; display: block !important; border-top: 2px dashed #ccc; padding-top: 20px; margin-top: 30px; }
      .answer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    }
  </style>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:15px;">
    <a href="index.html"><img src="Logo.png" alt="ABLE™ Logo"></a>
    <h1>ABLE™ MathABLE - Power Play</h1>
  </div>
  <nav><a href="index.html">Home</a></nav>
</header>

<main>
  <div class="tabs no-print">
    <button class="tab-trigger active" onclick="showTab(event, 'lessons')">Lessons</button>
    <button class="tab-trigger" onclick="showTab(event, 'worksheet')">Worksheet</button>
    <button class="tab-trigger" onclick="showTab(event, 'solve')">Solve Lab</button>
    <button class="tab-trigger" onclick="showTab(event, 'real')">Real Life Lab</button>
    <button class="tab-trigger" onclick="showTab(event, 'calculator')">Calculator</button>
  </div>

  <div id="lessons" class="lesson-card tab-content active"></div>
  
  <div id="calculator" class="lesson-card tab-content">
    <h2>🧮 Exponential Power Table</h2>
    <div style="margin-bottom: 15px; background: #f8fbff; padding: 15px; border-radius: 8px;" class="no-print">
      <label>Base Number: <input id="calc-base" type="number" value="2" style="width:60px;"></label>
      <label style="margin-left:15px;">Up to Power: <input id="calc-end" type="number" value="10" style="width:60px;"></label>
      <button class="action-btn" onclick="generateChart()" style="margin-left:15px;">Generate Chart Matrix</button>
    </div>
    <div id="calc-output" style="overflow-x:auto;"></div>
  </div>

  <div id="solve" class="lesson-card tab-content">
    <div id="solve-container"></div>
  </div>
  
  <div id="worksheet" class="lesson-card tab-content">
    <div class="print-only student-info">
        <div><b>Name:</b> ________________________</div>
        <div><b>Class:</b> ________</div>
        <div><b>Date:</b> ________</div>
    </div>
    <div id="worksheet-container"></div>
    <div id="answer-key-print" class="print-only answer-key-section">
        <h2>🔑 System Answer Verification Key</h2>
        <div id="answer-key-grid" class="answer-grid"></div>
    </div>
  </div>
  
  <div id="real" class="lesson-card tab-content">
    <div id="real-container"></div>
  </div>
</main>

<script>
  // Core Print Automation Hook Definition
  const ABLE_PDF = {
    download: function() {
        const isApple = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);
        if (isApple) {
            alert("Apple Device Routing Detected: Tap 'Share' -> select 'Save to Files' inside system window frame to output clean print vector files.");
        }
        window.print();
    }
  };

  // Structured Core Component Engine Objects
  const concept = {
    "title": "Power Play (Exponents)",
    "lessons": [
      { 
        "id":"pp1",
        "name":"Exponential Notation",
        "content":"Exponents represent repeated multiplication of the same number. Example: \\(5^4 = 5 \\times 5 \\times 5 \\times 5\\).<br><br><b>Key Terms:</b> In \\(5^4\\), 5 is the <b>base</b> and 4 is the <b>exponent</b> or power."
      },
      { 
        "id":"pp2",
        "name":"Multiplication Law",
        "content":"When multiplying powers with the same base, we add the exponents: \\(n^a \\times n^b = n^{a+b}\\).<br><br><b>Quick Practice:</b> Write \\(p^4 \\times p^6\\) in exponential form."
      },
      { 
        "id":"pp3",
        "name":"Division Law",
        "content":"When dividing powers with the same base, we subtract the exponents: \\(n^a \\div n^b = n^{a-b}\\) (where \\(n \\neq 0\\)).<br><br><b>Note:</b> If the exponent is 0, the total value is always equal to 1."
      },
      { 
        "id":"pp4",
        "name":"Scientific Notation",
        "content":"Large numbers are written as \\(x \\times 10^y\\), where \\(1 \\le x < 10\\).<br><br><b>Applications:</b> Used to express astronomical variables like the distance of the Sun or earth population density measurements concisely."
      }
    ]
  };

  // Compile Static Content Cards into DOM Tree Node
  const lessonDiv = document.getElementById("lessons");
  concept.lessons.forEach(l => {
    const block = document.createElement("div");
    block.className = "lesson";
    block.innerHTML = `<h2>${l.name}</h2><p>${l.content}</p>`;
    lessonDiv.appendChild(block);
  });

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function toggleAnswer(i) {
    const ansDiv = document.getElementById("answer-" + i);
    if(ansDiv) ansDiv.style.display = ansDiv.style.display === "none" ? "block" : "none";
  }

  // Interactive Chart Table Compilation Matrix Engine
  function generateChart() {
    const base = parseInt(document.getElementById("calc-base").value) || 2;
    const end = parseInt(document.getElementById("calc-end").value) || 10;
    const out = document.getElementById("calc-output");
    
    let table = `<table>
                 <thead><tr style="background:#f7fafc;"><th>Expression</th><th>Expanded Notation Array</th><th>Resolved Value</th></tr></thead>
                 <tbody>`;
    for (let i = 1; i <= end; i++) {
      let expanded = new Array(i).fill(base).join(" × ");
      let val = Math.pow(base, i);
      table += `<tr><td><b>\\(${base}^{${i}}\\)` + `</b></td><td style="font-family:monospace;">${expanded}</td><td><b>${val.toLocaleString()}</b></td></tr>`;
    }
    table += "</tbody></table>";
    out.innerHTML = table;
    if(window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
  }

  // Adaptive Worksheet Engine Real-time Calculation Processing Pipeline
  function generateWorksheet() {
    const worksheetContainer = document.getElementById("worksheet-container");
    const keyGrid = document.getElementById("answer-key-grid");
    const count = document.getElementById("qCount") ? parseInt(document.getElementById("qCount").value) : 5;
    
    let questions = [];
    let answers = [];

    for (let i = 0; i < count; i++) {
        const base = rand(2, 10);
        const exp1 = rand(2, 5);
        const exp2 = rand(2, 5);
        let q = "", a = "";
        const type = rand(0, 3);
        switch (type) {
            case 0: q = `Simplify operation profile: \\(${base}^{${exp1}} \\times ${base}^{${exp2}}\\)`; a = `\\(${base}^{${exp1+exp2}}\\)`; break;
            case 1: q = `Simplify operation profile: \\(${base}^{${exp1+exp2}} \\div ${base}^{${exp1}}\\)`; a = `\\(${base}^{${exp2}}\\)`; break;
            case 2: q = `Evaluate structural product criteria: \\((${base}^0 \\times ${base}^2)\\)`; a = `\\(${Math.pow(base, 2)}\\)`; break;
            case 3: q = `Convert to structural scientific matrix form: ${base * 1000}`; a = `\\(${base} \\times 10^3\\)`; break;
        }
        questions.push(q); answers.push(a);
    }

    const questionsListHtml = questions.map((q, i) => `
         <div class="question-item">
            <p style="font-size:1.1rem; margin-bottom:10px;"><strong>Q${i + 1}.</strong> ${q}</p>
            <button class="action-btn no-print" onclick="toggleAnswer(${i})" style="padding:4px 12px; font-size:0.85rem;">Toggle Solution</button>
            <div id="answer-${i}" class="no-print" style="display:none; color:var(--success); margin-top:10px; font-weight:bold; border-left:3px solid var(--success); padding-left:10px;">Answer Evaluation: ${answers[i]}</div>
         </div>
    `).join("");

    keyGrid.innerHTML = answers.map((a, i) => `<div><strong>Q${i + 1}:</strong> ${a}</div>`).join("");

    worksheetContainer.innerHTML = `
        <h2 class="no-print">📄 Custom Practice Framework (Assess)</h2>
        <div class="no-print" style="margin-bottom:20px; display: flex; gap: 10px; align-items: center; background:#f8fbff; padding:15px; border-radius:10px; border:1px solid #e1e8f0;">
            <label>Question Limit Parameters: </label>
            <input type="number" id="qCount" value="${count}" min="1" max="20" style="width: 60px;">
            <button class="action-btn" onclick="generateWorksheet()">Recompile Set</button>
            <button class="action-btn" onclick="ABLE_PDF.download()" style="background:var(--accent);">📥 Download Assignment Sheets</button>
        </div>
        <div>${questionsListHtml}</div>
    `;
    if(window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
  }

  // Structural Cognitive Framework Implementation Resolver Lab
  function loadSolveLab() {
    const container = document.getElementById("solve-container");
    const type = rand(0, 2);
    const base = rand(2, 9);
    const exp1 = rand(2, 6);
    const exp2 = rand(2, 4);

    let problemText = "";
    let step1Question = "";
    let step2Thinking = "";
    let correctRule = "";

    if (type === 0) {
        problemText = `Simplify: \\(${base}^{${exp1}} \\times ${base}^{${exp2}}\\)`;
        step1Question = "Identify the transformation mapping rule required when multiplying identical algebraic bases:";
        correctRule = "add";
        step2Thinking = `Calculate exponential sum profile execution: \\(${exp1} + ${exp2}\\)?`;
        window.currentAnswer = exp1 + exp2;
    } else if (type === 1) {
        const e1 = Math.max(exp1, exp2) + rand(1, 2);
        const e2 = Math.min(exp1, exp2);
        problemText = `Simplify: \\(${base}^{${e1}} \\div ${base}^{${e2}}\\)`;
        step1Question = "Identify the transformation mapping rule required when dividing identical algebraic bases:";
        correctRule = "sub";
        step2Thinking = `Calculate exponential reduction delta execution: \\(${e1} - ${e2}\\)?`;
        window.currentAnswer = e1 - e2;
    } else {
        problemText = `Simplify: \\((${base}^{${exp1}})^{${exp2}}\\)`;
        step1Question = "Identify the transformation mapping rule required across complex power nested structures:";
        correctRule = "mul";
        step2Thinking = `Calculate complex grouping system product execution: \\(${exp1} \\times ${exp2}\\)?`;
        window.currentAnswer = exp1 * exp2;
    }

    container.innerHTML = `
      <h2>🧠 Structural Process Method Lab</h2>
      <div style="background:#f0f4f8; padding:20px; border-radius:10px; font-size:1.3rem; margin-bottom:20px; font-weight:bold; text-align:center;">
          <b>Problem Target Array:</b> ${problemText}
      </div>
      
      <div id="step1" style="background:white; padding:20px; border-radius:8px; border:1px solid #cbd5e0; margin-bottom:20px;">
        <p style="margin-bottom:10px;"><b>Step 1 (Ask Identity):</b> ${step1Question}</p>
        <select id="rule-select">
          <option value="">-- Choose Identity Map --</option>
          <option value="add">Summation Matrix Rule (Add Exponents)</option>
          <option value="sub">Reduction Variance Rule (Subtract Exponents)</option>
          <option value="mul">Factor Multiplier Rule (Multiply Exponents)</option>
        </select>
        <button class="action-btn" onclick="checkRule('${correctRule}')">Verify Law Mapping</button>
        <div id="rule-feedback" style="margin-top:10px; font-weight:bold;"></div>
      </div>

      <div id="step2" style="display:none; background:white; padding:20px; border-radius:8px; border:1px solid #cbd5e0; margin-bottom:20px;">
        <p style="margin-bottom:10px;"><b>Step 2 (Think Execution):</b> ${step2Thinking}</p>
        <input id="final-answer" type="number" placeholder="Value" style="width:100px;">
        <button class="action-btn" onclick="checkFinalAnswer()">Validate Evaluation Vector</button>
        <div id="final-feedback" style="margin-top:10px; font-weight:bold;"></div>
      </div>

      <div id="next-step" style="display:none; margin-top:20px;">
         <button class="action-btn" onclick="loadSolveLab()" style="background:var(--success); width:100%; padding:15px; font-size:1.1rem;">
            Load Next Operation Vector Matrix ➔
         </button>
      </div>
    `;
    if(window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
  }

  function checkRule(correctRule) {
    const val = document.getElementById("rule-select").value;
    const feedback = document.getElementById("rule-feedback");
    const step2 = document.getElementById("step2");

    if (val === "") {
        feedback.innerHTML = "⚠️ Interface selection buffer unassigned. Pick structural property choice.";
        feedback.style.color = "orange";
        return;
    }

    if (val === correctRule) {
        feedback.innerHTML = "✅ Identity Mapping Confirmed! Operational criteria matching selected Law path parameters.";
        feedback.style.color = "var(--success)";
        step2.style.display = "block";
        step2.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
        let hint = "";
        switch (correctRule) {
            case 'add': hint = "💡 Thinking Vector Shift: Combining product sets scaling base factors upward. Does expansion correlate with sum or difference?"; break;
            case 'sub': hint = "💡 Thinking Vector Shift: Fractional scaling eliminates matching base multiples. Which operation calculates remaining delta?"; break;
            case 'mul': hint = "💡 Thinking Vector Shift: Nested systems repeat entire exponential groups. Identify fast matrix scaling calculations shortcut paths."; break;
        }
        feedback.innerHTML = hint;
        feedback.style.color = "var(--accent)";
    }
  }

  function checkFinalAnswer() {
    const user = parseInt(document.getElementById("final-answer").value);
    const feedback = document.getElementById("final-feedback");
    
    if (user === window.currentAnswer) {
        feedback.innerHTML = "✅ Precision Metric Absolute! Base valuation resolved correctly to exponent degree: " + user;
        feedback.style.color = "var(--success)";
        document.getElementById("next-step").style.display = "block";
    } else {
        feedback.innerHTML = "❌ Computation delta variation found. Re-verify structural addition/multiplication steps.";
        feedback.style.color = "red";
    }
  }

  // Real-World Systems Multiplicity Node Environments
  function loadRealLifeLab() {
    const container = document.getElementById("real-container");
    const scenarios = [
      {
        title: "Symmetric Paper Displacement Folding Scaling",
        story: "A processing medium substrate matrix doubles tracking thickness values cleanly along structural bounds at every crisp compression intersection.",
        question: "Given a thin structural footprint thickness sizing hitting 0.001 cm, calculate space volume scale after executing 10 programmatic configurations.",
        steps: ["Symmetric Scale Engine Definition: Base Matrix Parameter × 2^operations","Geometric Equation Mapping: 0.001 × 2^10","Calculation Matrix Target Profile: 0.001 × 1024"],
        final: "1.024 cm displacement absolute scale width parameters reached."
      },
      {
        title: "Dynamic Lotus Colony Overgrowth Multiplicity Array",
        story: "A biological system population cluster profile located inside controlled tracking limits systematically matches double growth parameters every 24-hour cycle loop, hitting absolute maximum load capacities at precisely day 30.",
        question: "Isolate the runtime coordinate index signature marking exactly half framework initialization load density.",
        steps: ["Exponential Multiplicity Modeling Tracking Matrix Pattern (Scale Factor = 2)","Inverse Vector Step Tracking: Half load allocation boundaries sit exactly 1 coordinate point behind step limit caps","Structural Delta Calculation: 30 - 1 Axis Coordinates Step Target"],
        final: "Determined coordinate match settles exactly onto the 29th Frame Index Day sequence boundary."
      }
    ];
    const random = scenarios[Math.floor(Math.random() * scenarios.length)];
    container.innerHTML = `
      <h2>🌍 Case Study Framework Analysis Matrix</h2>
      <h3>${random.title}</h3>
      <p style="margin-bottom:12px; line-height:1.5;">${random.story}</p>
      <p><b>Target System Tracking Target Question:</b> ${random.question}</p>
      <div style="background:#f7fafc; padding:20px; border-radius:8px; border:1px solid #e2e8f0; margin-top:15px;">
        <p><b>🧠 Trace Operations Track Array:</b></p>
        <ol style="margin-left:20px; margin-top:5px; line-height:1.6;">${random.steps.map(s => `<li>${s}</li>`).join("")}</ol>
        <p style="margin-top:12px; font-weight:bold; color:var(--success);">✅ Verified Scalar Answer Vector: ${random.final}</p>
      </div>
      <br><button class="action-btn" onclick="loadRealLifeLab()">Next Case Framework Profile ➡</button>
    `;
    if(window.MathJax && window.MathJax.typesetPromise) MathJax.typesetPromise();
  }

  // Functional System Routing Workspace Tab Controller
  function showTab(evt, id) {
    if(evt && evt.preventDefault) evt.preventDefault();
    
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    
    document.getElementById(id).classList.add('active');
    if(evt && evt.target) evt.target.classList.add('active');
    
    if (id === "solve") loadSolveLab();
    if (id === "real") loadRealLifeLab();
    if (id === "worksheet") generateWorksheet();
    if (id === "calculator") generateChart();
  }
</script>

</body>
</html>
